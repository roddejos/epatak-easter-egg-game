<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>ePatak Run</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  :root{
    --sky-top:#7ec8ff;
    --sky-bottom:#bfe6ff;
    --ground:#3a2a1d;
    --ground-dark:#2a1d13;
    --pipe:#1d6fd6;
    --pipe-dark:#114a91;
    --pipe-light:#4a9bf0;
    --char:#1f4fb0;
    --char-dark:#15336f;
    --char-light:#6aa3ff;
    --ui-text:#16243f;
    --panel:#fffbe8;
    --panel-border:#16243f;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body{
    margin:0;
    height:100%;
    overflow:hidden;
    touch-action:none;
  }

  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    min-height:100dvh;
    background:#202F3A;
    font-family:'Press Start 2P', monospace;
    color:var(--ui-text);
    padding:0;
    gap:0;
  }

  #page{
    display:flex;
    flex-direction:column;
    align-items:center;
    width:100%;
    max-width:480px;
    height:100%;
    gap:0;
  }

  #wrap{
    position:relative;
    image-rendering:pixelated;
    width:100%;
    flex:1 1 auto;
    min-height:0;
    overflow:hidden;
  }

  canvas{
    display:block;
    width:100%;
    height:100%;
    background:linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-top) 60%, var(--sky-bottom) 100%);
    image-rendering:pixelated;
    touch-action:none;
  }

  #hud{
    position:absolute;
    top:8px;
    right:10px;
    font-size:10px;
    color:#16243f;
    text-shadow:1px 1px 0 #ffffffaa;
    letter-spacing:1px;
  }

  #jumpBtn{
    position:absolute;
    left:50%;
    bottom:9%;
    transform:translateX(-50%);
    width:clamp(140px, 45%, 220px);
    height:clamp(60px, 12vh, 88px);
    font-family:'Press Start 2P', monospace;
    font-size:clamp(13px, 4vw, 18px);
    letter-spacing:2px;
    color:#fffbe8;
    background:#0a7ad0;
    border:4px solid #fffbe8;
    border-radius:1000px;
    box-shadow:0 6px 0 var(--pipe-dark);
    user-select:none;
    -webkit-user-select:none;
    touch-action:none;
    cursor:pointer;
    z-index:5;
  }

  #jumpBtn:active,
  #jumpBtn.pressed{
    transform:translateX(-50%) translateY(4px);
    box-shadow:0 2px 0 var(--pipe-dark);
    background:var(--pipe-dark);
  }

  #overlay{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:rgba(12,24,48,0.55);
    text-align:center;
    color:#fffbe8;
    gap:14px;
    padding:20px;
  }

  #overlay.hidden{ display:none; }

  #overlay h1{
    font-size:16px;
    margin:0;
    text-shadow:2px 2px 0 #000;
  }

  #overlay p{
    font-size:9px;
    margin:0;
    line-height:1.8;
    opacity:0.9;
  }
</style>
</head>
<body>

<div id="page">
  <div id="wrap">
    <div id="hud">SCORE 0</div>
    <canvas id="game" width="480" height="480"></canvas>
    <div id="overlay" class="hidden">
      <h1 id="overlayTitle">GAME OVER</h1>
      <p id="overlayScore"></p>
    </div>
    <button id="jumpBtn">JUMP</button>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  const wrapEl = document.getElementById('wrap');

  let W = canvas.width, H = canvas.height;
  const GROUND_BAND = 140; // total height of grass+dirt ground strip -- change this number to make the ground taller/shorter
  let GROUND_Y = H - GROUND_BAND;

  function resizeCanvas(){
    const newW = Math.max(200, Math.round(canvas.clientWidth));
    const newH = Math.max(200, Math.round(canvas.clientHeight));
    if(newW === W && newH === H) return;

    W = canvas.width = newW;
    H = canvas.height = newH;
    GROUND_Y = H - GROUND_BAND;
    ctx.imageSmoothingEnabled = false;

    // keep the player resting on the ground if it's not mid-jump
    if(typeof player !== 'undefined' && !player.jumping){
      player.y = GROUND_Y - player.h;
    }
  }

  const hud = document.getElementById('hud');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayScore = document.getElementById('overlayScore');

  // ---------------------------------------------------------------
  // CHARACTER SPRITES (your own artwork)
  // ---------------------------------------------------------------
  // Two run-cycle frames, loaded from separate webp files sitting
  // next to this HTML file. Keep run-1.webp and run-2.webp in the
  // same folder as this file wherever you deploy/embed it.
  const runImg1 = new Image();
  runImg1.src = "run-1.webp";
  const runImg2 = new Image();
  runImg2.src = "run-2.webp";

  const CHAR_W = 64, CHAR_H = 64; // on-screen size, scaled up from the 128x128 source

  const player = {
    x: 60,
    y: GROUND_Y - CHAR_H,
    w: CHAR_W,
    h: CHAR_H,
    vy: 0,
    jumping: false,
  };

  const GRAVITY = 0.85;
  const JUMP_VELOCITY = -13.5;

  let runFrameToggle = false;
  let runFrameTimer = 0;

  function drawCharacter(){
    // No separate jump frame yet -- reuse a run frame while airborne.
    // (Once you have a jump pose, swap this for a third Image like the
    // run frames above and draw it here when player.jumping is true.)
    const img = runFrameToggle ? runImg1 : runImg2;
    if(img.complete && img.naturalWidth > 0){
      ctx.drawImage(img, Math.round(player.x), Math.round(player.y), player.w, player.h);
    }
  }

  // ---------------------------------------------------------------
  // OBSTACLES: blue Mario-style pipes
  // ---------------------------------------------------------------
  let pipes = [];
  const PIPE_W = 30;
  const PIPE_LIP_H = 12;

  function spawnPipe(){
    const h = 32 + Math.random()*30; // 32-62px tall (was 40-85)
    pipes.push({ x: W + 20, w: PIPE_W, h: h });
  }

  function drawPipe(p){
    const x = Math.round(p.x);
    const y = GROUND_Y - p.h;

    ctx.fillStyle = '#114a91';
    ctx.fillRect(x, y, p.w, p.h);
    ctx.fillStyle = '#1d6fd6';
    ctx.fillRect(x+3, y, p.w-9, p.h);
    ctx.fillStyle = '#4a9bf0';
    ctx.fillRect(x+3, y, 4, p.h);

    const lipX = x - 3;
    const lipW = p.w + 6;
    ctx.fillStyle = '#114a91';
    ctx.fillRect(lipX, y, lipW, PIPE_LIP_H);
    ctx.fillStyle = '#1d6fd6';
    ctx.fillRect(lipX+3, y, lipW-9, PIPE_LIP_H);
    ctx.fillStyle = '#4a9bf0';
    ctx.fillRect(lipX+3, y, 4, PIPE_LIP_H);
  }

  // ---------------------------------------------------------------
  // GROUND + BACKGROUND
  // ---------------------------------------------------------------
  let groundOffset = 0;
  let cloudOffset = 0;

  function drawBackground(){
    ctx.fillStyle = '#cdeeff';
    ctx.fillRect(0,0,W,H);
    const grad = ctx.createLinearGradient(0,0,0,GROUND_Y);
    grad.addColorStop(0,'#7ec8ff');
    grad.addColorStop(1,'#cdeeff');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,GROUND_Y);

    ctx.fillStyle = '#ffffffcc';
    const wrap = W + 160;
    for(let i=0;i<4;i++){
      const raw = (i*160 - cloudOffset) % wrap;
      const cx = ((raw % wrap) + wrap) % wrap - 80; // always positive, wraps cleanly
      const cy = 30 + (i%3)*22;
      drawCloud(cx, cy);
    }
  }

  function drawCloud(x,y){
    ctx.fillRect(x, y, 30, 10);
    ctx.fillRect(x+8, y-8, 20, 10);
    ctx.fillRect(x-8, y+4, 46, 8);
  }

  function drawGround(){
    // dirt base
    ctx.fillStyle = '#3a2a1d';
    ctx.fillRect(0, GROUND_Y, W, H-GROUND_Y);
    ctx.fillStyle = '#2a1d13';
    const tile = 20;
    for(let x = -((groundOffset)%tile); x < W; x += tile){
      ctx.fillRect(x, GROUND_Y+6, 10, 6);
    }

    // grass strip on top of the dirt
    const GRASS_H = 10;
    const grassTop = GROUND_Y - GRASS_H;
    ctx.fillStyle = '#a7df35';
    ctx.fillRect(0, grassTop, W, GRASS_H);

    // darker shading near the dirt seam
    ctx.fillStyle = '#2f8a3d';
    ctx.fillRect(0, grassTop+GRASS_H-3, W, 3);

    // jagged little tufts poking up above the strip
    ctx.fillStyle = '#a7df35';
    const tuft = 8;
    for(let x = -((groundOffset)%tuft); x < W; x += tuft){
      ctx.fillRect(x, grassTop-3, 3, 3);
      ctx.fillRect(x+5, grassTop-5, 3, 5);
    }

    // a few lighter highlight blades for texture
    ctx.fillStyle = '#5fc463';
    const hl = 40;
    for(let x = -((groundOffset)%hl); x < W; x += hl){
      ctx.fillRect(x+12, grassTop+2, 4, 3);
    }

    ctx.fillStyle = '#4a3424';
    ctx.fillRect(0, GROUND_Y, W, 2);
  }

  // ---------------------------------------------------------------
  // GAME STATE
  // ---------------------------------------------------------------
  let speed = 5;
  let score = 0;
  let running = false;
  let gameOver = false;
  let spawnTimer = 0;
  let nextSpawnGap = 90;

  function resetGame(){
    player.y = GROUND_Y - CHAR_H;
    player.vy = 0;
    player.jumping = false;
    pipes = [];
    speed = 5;
    score = 0;
    spawnTimer = 0;
    nextSpawnGap = 90;
    gameOver = false;
    runFrameTimer = 0;
    runFrameToggle = false;
    hud.textContent = 'SCORE 0';
  }

  function jump(){
    if(!running){
      startGame();
      return;
    }
    if(gameOver){
      resetGame();
      running = true;
      overlay.classList.add('hidden');
      return;
    }
    if(!player.jumping){
      player.vy = JUMP_VELOCITY;
      player.jumping = true;
    }
  }

  function startGame(){
    resetGame();
    running = true;
    gameOver = false;
    overlay.classList.add('hidden');
  }

  function endGame(){
    running = false;
    gameOver = true;
    overlay.classList.remove('hidden');
    overlayTitle.textContent = 'GAME OVER';
    overlayScore.textContent = 'SCORE ' + Math.floor(score);
  }

  // ---------------------------------------------------------------
  // INPUT
  // ---------------------------------------------------------------
  const jumpBtn = document.getElementById('jumpBtn');

  window.addEventListener('keydown', (e)=>{
    if(e.code === 'Space'){
      e.preventDefault();
      jump();
    }
    if(e.code === 'KeyR'){
      resetGame();
      running = true;
      overlay.classList.add('hidden');
    }
  });

  // Canvas: mouse click still works (desktop), touch handled on the
  // dedicated jump button below instead, so we don't double-fire.
  canvas.addEventListener('mousedown', jump);

  function pressJumpBtn(e){
    e.preventDefault();
    jumpBtn.classList.add('pressed');
    jump();
  }
  function releaseJumpBtn(e){
    e.preventDefault();
    jumpBtn.classList.remove('pressed');
  }
  jumpBtn.addEventListener('touchstart', pressJumpBtn, {passive:false});
  jumpBtn.addEventListener('touchend', releaseJumpBtn, {passive:false});
  jumpBtn.addEventListener('mousedown', pressJumpBtn);
  jumpBtn.addEventListener('mouseup', releaseJumpBtn);
  jumpBtn.addEventListener('mouseleave', releaseJumpBtn);

  // ---------------------------------------------------------------
  // MAIN LOOP
  // ---------------------------------------------------------------
  function update(dt){
    if(!running) return;

    // physics
    player.vy += GRAVITY * dt;
    player.y += player.vy * dt;
    if(player.y >= GROUND_Y - CHAR_H){
      player.y = GROUND_Y - CHAR_H;
      player.vy = 0;
      player.jumping = false;
    }

    // run animation timing
    runFrameTimer += dt;
    if(runFrameTimer > 6){
      runFrameTimer = 0;
      runFrameToggle = !runFrameToggle;
    }

    // scroll
    groundOffset += speed * dt;
    cloudOffset += speed*0.2 * dt;

    // pipes
    spawnTimer += dt;
    if(spawnTimer > nextSpawnGap){
      spawnTimer = 0;
      nextSpawnGap = 70 + Math.random()*60;
      spawnPipe();
    }
    for(const p of pipes){ p.x -= speed * dt; }
    pipes = pipes.filter(p => p.x + p.w > -20);

    // collision (slightly inset hitbox for fairness)
    const pad = 6;
    const pBox = { x: player.x+pad, y: player.y+pad, w: player.w-pad*2, h: player.h-pad*2 };
    for(const p of pipes){
      const pipeY = GROUND_Y - p.h;
      if(pBox.x < p.x + p.w && pBox.x + pBox.w > p.x &&
         pBox.y < GROUND_Y && pBox.y + pBox.h > pipeY){
        endGame();
        break;
      }
    }

    // score + difficulty
    score += 0.12 * dt;
    speed = 5 + score*0.01;
    hud.textContent = 'SCORE ' + Math.floor(score);
  }

  function render(){
    drawBackground();
    drawGround();
    for(const p of pipes){ drawPipe(p); }
    drawCharacter();
  }

  // Time-based loop: dt is normalized so dt=1 means "one frame at a
  // reference 60fps". On a 120Hz screen, frames fire twice as often
  // but each delta is half as long, so dt ends up ~0.5 per frame --
  // movement per second stays the same no matter the refresh rate.
  let lastTime = null;
  function loop(timestamp){
    if(lastTime === null) lastTime = timestamp;
    const deltaMs = timestamp - lastTime;
    lastTime = timestamp;
    // clamp dt so a dropped/backgrounded tab doesn't cause one huge jump
    const dt = Math.min(Math.max(deltaMs, 0) / (1000/60), 3);

    update(dt);
    render();
    requestAnimationFrame(loop);
  }

  // initial sizing + responsive resize handling
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', ()=> setTimeout(resizeCanvas, 50));
  if(typeof ResizeObserver !== 'undefined'){
    new ResizeObserver(resizeCanvas).observe(wrapEl);
  }

  // initial idle frame before start
  render();
  requestAnimationFrame(loop);
})();
</script>

</body>
</html>
